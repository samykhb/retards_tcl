version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  producer:
    build: ./1_ingestion
    container_name: tcl_producer
    depends_on:
      - kafka
    restart: on-failure
    # Le Dockerfile execute par defaut "python producer_tcl.py"

  consumer:
    build: ./1_ingestion
    container_name: tcl_consumer
    depends_on:
      - kafka
    # Maintient le conteneur actif pour executer le script manuellement
    command: tail -f /dev/null

  archiver:
    build: ./1_ingestion
    container_name: tcl_archiver
    depends_on:
      - kafka
    volumes:
      - ./data/raw:/app/data/raw
    command: ["python", "-u", "archive_to_parquet.py"]
    restart: on-failure